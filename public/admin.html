<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Entry · Manor Lanes Fundraisers</title>
  <link rel="stylesheet" href="/static/css/app.css?v=8">
</head>
<body>
  <header class="app">
    <img class="brand" src="/static/logos/manor-lanes.png" alt="Manor Lanes" onerror="this.style.display='none'">
    <h1 id="evtTitle">Entry</h1>
    <div class="spacer"></div>
    <a class="btn secondary" href="/">Home</a>
  </header>

  <!-- PIN screen -->
  <section id="pinScreen" class="pin-screen">
    <div class="card pin-card">
      <h2 style="margin-top:0">Enter PIN</h2>
      <p class="muted small">PIN is the event date in MMDD format.</p>
      <div class="field">
        <input id="pinInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" placeholder="MMDD">
      </div>
      <button id="pinBtn" style="width:100%">Unlock</button>
      <p id="pinErr" class="small" style="color:var(--bad);margin-top:10px;display:none">Wrong PIN.</p>
    </div>
  </section>

  <!-- Main entry view -->
  <main id="entryView" class="container" style="display:none">
    <div class="card stack">
      <div class="row between">
        <div>
          <div id="evtMeta" class="muted small"></div>
        </div>
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <button id="renameEventBtn" class="secondary" style="font-size:13px;padding:8px 12px">Rename event</button>
          <button id="adjustCountBtn" class="secondary" style="font-size:13px;padding:8px 12px">Change basket count</button>
          <a id="displayLink" class="btn secondary small" target="_blank" style="font-size:13px;padding:8px 12px">Open Display</a>
          <a id="listLink" class="btn secondary small" target="_blank" style="font-size:13px;padding:8px 12px">Customer List</a>
        </div>
      </div>
      <div class="row between small muted">
        <div>Tap a basket to enter or edit its winning ticket number.</div>
        <div id="connState">●</div>
      </div>
      <div id="grid" class="admin-grid"></div>
    </div>
  </main>

  <!-- Edit modal -->
  <div id="modal" class="modal-bg" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 id="modalTitle">Basket #</h3>
      <div class="field">
        <label for="ticketInput">Winning ticket number</label>
        <input id="ticketInput" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="e.g. 1234567">
      </div>
      <div class="field">
        <label for="descInput">Basket description (optional)</label>
        <input id="descInput" type="text" placeholder="e.g. Spa Day Basket" maxlength="100">
      </div>
      <div class="field">
        <label for="categoryInput">Category</label>
        <select id="categoryInput">
          <option value="">Regular Basket (gold)</option>
          <option value="big">Big Ticket Item (orange)</option>
          <option value="special">Special (purple)</option>
        </select>
      </div>
      <div class="field">
        <label class="toggle">
          <input id="pickedInput" type="checkbox">
          <span>Picked up by winner</span>
        </label>
      </div>
      <div class="actions">
        <button class="secondary" id="clearBtn" type="button">Clear</button>
        <button class="secondary" id="cancelBtn" type="button">Cancel</button>
        <button id="saveBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/js/admin.js?v=8"></script>
</body>
</html>
